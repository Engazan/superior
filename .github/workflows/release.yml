name: Release

# Pushing a version tag (e.g. v0.1.0) builds the macOS, Windows and Linux apps
# and publishes them as assets on a GitHub Release for that tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-pty is a native module: Linux needs the build toolchain to compile
      # it (and electron-rebuild) when no prebuilt binary matches.
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      # `npm ci` runs the postinstall electron-rebuild for node-pty.
      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build and package
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Each OS job appends its installers to the same tag's release; the first
      # job to run creates it. Drafted so you can review before publishing.
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          fail_on_unmatched_files: false
